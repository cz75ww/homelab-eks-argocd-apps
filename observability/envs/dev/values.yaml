# ADOT Collector config
serviceAccount:
  roleArn: ""

amp:
  workspaceUrl: ""

receivers:
  otlp:
    grpc:
      endpoint: "0.0.0.0:4317"
    http:
      endpoint: "0.0.0.0:4318"

exporters:
  prometheus:
    enabled: true
    endpoint: "0.0.0.0:8889"
  amp:
    enabled: true
  cloudwatch:
    enabled: false
  xray:
    enabled: false

processors:
  batch:
    timeout: "5s"
    sendBatchSize: 1000
  memory_limiter:
    checkInterval: "1s"
    limitMib: 200
    spikeLimitMib: 50

# Standalone Grafana
grafana:
  adminPassword: "admin"
  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
    hosts:
      - grafana.studyk8s.com
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: AMP
          type: prometheus
          url: "" # your AMP workspace endpoint
          isDefault: true
          jsonData:
            sigV4Auth: true
            sigV4Region: eu-west-1
            sigV4AuthType: ec2_iam_role
