apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-sidecar
  namespace: {{ .Values.grafana.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grafana-sidecar
subjects:
  - kind: ServiceAccount
    name: grafana
    namespace: {{ .Values.grafana.namespace }}