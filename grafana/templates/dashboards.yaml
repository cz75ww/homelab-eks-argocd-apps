apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node-exporter
  namespace: {{ .Values.grafana.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  node-exporter-full.json: |-
    {{ .Files.Get "dashboards/node-exporter-full.json" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kubernetes
  namespace: {{ .Values.grafana.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  kubernetes-cluster.json: |-
    {{ .Files.Get "dashboards/kubernetes-cluster.json" | nindent 4 }}