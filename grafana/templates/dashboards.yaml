apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node-exporter
  namespace: {{ .Values.grafana.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  node-exporter.json: |-
    {{ .Files.Get "dashboards/node-exporter.json" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kubernetes
  namespace: {{ .Values.grafana.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  kubernetes-cluster.json: |-
    {{ .Files.Get "dashboards/kubernetes-cluster.json" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana
  namespace: {{ .Values.grafana.namespace }}
data:
  grafana.ini: |
    [analytics]
    check_for_updates = true
    [auth]
    sigv4_auth_enabled = true
    [grafana_net]
    url = https://grafana.net
    [log]
    mode = console
    [paths]
    data = /var/lib/grafana/
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning
    [server]
    domain = ''